<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <link rel="stylesheet" href="./Registrar.CSS">
    <link href="../../styles/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">   
</head>
    <body>
        <header>
            <div id="title">
                <ul>
                    <li><img class="logo" src="../../components/Images/logo.png" alt="logo"></li>
                    <li class="name"><h1>SolarWave</h1></li>
                </ul>
            </div>

            <ul>
                <a href="#"><li>Sobre nós</li></a>
                <a href="#"><li>Serviços</li></a>
                <a href="#"><li>Projetos</li></a>
                <a href="#"><li>Contate-nos</li></a>
            </ul>
        </header>
        <div class="corpo">
            <div class="Container">
                <h1 class="login">Registrar</h1>

                <div class="form-scroll">

                    <div class="Nome">
                        <label for="nome"></label>
                        <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
                    </div>

                    <div class="Email">
                        <label for="email"></label>
                        <input type="email" id="email" name="email" placeholder="Digite seu email/Usuário">
                    </div>

                    <div class="CEP">
                        <label for="cep"></label>
                        <input type="text" id="cep" name="cep" placeholder="Digite seu CEP">
                    </div>

                    <div class="Estado">
                        <label for="estado"></label>
                        <select id="estado" name="estado">
                            <option value="" disabled selected>Selecione seu estado</option>

                            <optgroup label="Norte">
                                <option value="AC">Acre</option>
                                <option value="AM">Amazonas</option>
                                <option value="AP">Amapá</option>
                                <option value="PA">Pará</option>
                                <option value="RO">Rondônia</option>
                                <option value="RR">Roraima</option>
                                <option value="TO">Tocantins</option>
                            </optgroup>

                            <optgroup label="Nordeste">
                                <option value="AL">Alagoas</option>
                                <option value="BA">Bahia</option>
                                <option value="CE">Ceará</option>
                                <option value="MA">Maranhão</option>
                                <option value="PB">Paraíba</option>
                                <option value="PE">Pernambuco</option>
                                <option value="PI">Piauí</option>
                                <option value="RN">Rio Grande do Norte</option>
                                <option value="SE">Sergipe</option>
                            </optgroup>

                            <optgroup label="Centro-Oeste">
                                <option value="DF">Distrito Federal</option>
                                <option value="GO">Goiás</option>
                                <option value="MS">Mato Grosso do Sul</option>
                                <option value="MT">Mato Grosso</option>
                            </optgroup>

                            <optgroup label="Sudeste">
                                <option value="ES">Espírito Santo</option>
                                <option value="MG">Minas Gerais</option>
                                <option value="RJ">Rio de Janeiro</option>
                                <option value="SP">São Paulo</option>
                            </optgroup>

                            <optgroup label="Sul">
                                <option value="PR">Paraná</option>
                                <option value="RS">Rio Grande do Sul</option>
                                <option value="SC">Santa Catarina</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="Cidade">
                        <label for="cidade"></label>
                        <input type="text" id="cidade" name="cidade" placeholder="Digite sua cidade">
                    </div>

                    <div class="Endereco">
                        <label for="Rua"></label>
                        <input type="text" id="Rua" name="Rua" placeholder="Digite seu endereço">
                    </div>

                    <div class="Senha">
                        <label for="senha"></label>
                        <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
                    </div>

                    <div class="ConfirmarSenha">
                        <label for="confirmar-senha"></label>
                        <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Confirme sua senha">
                    </div>

                    <p class="Mensagem"></p>
                    <p>Já tem uma conta? <a href="../Login.html" class="Registrar">Faça Login</a></p>
                    <button id="loginButton" onclick="verificarSenha()" ><i class="bi bi-arrow-return-right"></i></button>
                </div>

                

                    
            </div>
        <div class="Registrar">

        </div>
        
    </body>

    <script src="Registrar.JS"></script>
</html>
