<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <link rel="stylesheet" href="./Registrar.CSS">
    <link href="/UPX/styles/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">   
</head>
    <body>
        <header>
            <div id="title">
                <ul>
                    <li><img class="logo" src="../../components/Images/logo.png" alt="logo"></li>
                    <li class="name"><h1>BitsAndBytes</h1></li>
                </ul>
            </div>

            <ul>
                <a href="#"><li>Sobre nós</li></a>
                <a href="#"><li>Serviços</li></a>
                <a href="#"><li>Projetos</li></a>
                <a href="#"><li>Contate-nos</li></a>
            </ul>
        </header>
        <div class="corpo">
            <div class="Container">
                <h1 class="login">Registrar</h1>
                <div class="Email">
                    <label for="email"></label>
                    <input type="email" id="email" name="email" placeholder="Digite seu email">
                </div>
                <div class="Senha">
                    <label for="senha"></label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
                </div>
                <div class="ConfirmarSenha">
                    <label for="confirmar-senha"></label>
                    <input type="password" id="confirmar-senha" name="confirmar-senha" placeholder="Confirme sua senha">
                </div>
                <p>Já tem uma conta? <a href="../Login.html" class="Registrar">Faça Login</a></p>
                <button id="loginButton"><i class="bi bi-arrow-return-right"></i></button>
            </div>
        </div>
        <div class="Registrar">

        </div>
        
    </body>

    <script src="Login.JS"></script>
</html>
