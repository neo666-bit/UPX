<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
</head>
<body>
    <div id="personalizar-perfil">
        
        <div class="esquerda-perfil">
            <p>Perfil</p>
            <i class="bi bi-person-circle"></i>
            <a href="#">Alterar avatar</a>
        </div>

        <div class="direita-perfil">
            <form>
                
                <div class="grupo-perfil">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" disabled>
                </div>

                <!-- <div class="grupo-perfil">
                    <label for="cep">CEP:</label>
                    <input type="text" id="cep" name="cep" disabled>
                </div>
                 -->
                <div class="grupo-perfil">
                    <label for="telefone">Telefone:</label>
                    <input type="text" id="telefone" name="telefone" maxlength="15" inputmode="numeric" disabled>
                </div>

                <div class="grupo-perfil">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" disabled>
                </div>
                
                <!-- <div class="grupo-perfil grupo-endereco">
                    <label for="Rua">Endereço da residência:</label>
                    <input type="text" id="Rua" name="Rua" disabled>
                </div> -->

                <!-- <div class="grupo-perfil">
                    <label for="cidade">Cidade:</label>
                    <input type="text" id="cidade" name="cidade" disabled>
                </div> -->

                <div class="grupo-perfil">
                    <label for="estado">Estado:</label>
                    <input type="text" id="estado" name="estado" disabled>
                </div>

            </form>
        </div>
    </div>
</body>
</html>
