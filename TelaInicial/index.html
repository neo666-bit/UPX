<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">   
    <title>Tela Inicial</title>
</head>
<body>
    
    <nav id="sidebar">
        
        <div id="upx-name">
                <img class="logo" src="../components/Images/logo.png" alt="logo">
                <p>BitsAndBytes</p>
        </div>
        
        <ul id="sidebar-items">
            <li>
                <a href="/TelaInicial/Pages/economia.html">
                    <i class="bi bi-bar-chart-fill"></i>
                    <span>Economia</span>
                </a>
                
            </li>
            <li>
                <a href="/TelaInicial/Pages/relatorio.html">
                    <i class="bi bi-journal-text"></i>
                    <span>Relatório</span>
                </a>
                
            </li>
            <li>
                <a href="/TelaInicial/Pages/placas.html">
                    <i class="bi bi-sun-fill"></i>
                    <span>Placas</span>
                </a>
                
            </li>
            <li>
                <a href="/TelaInicial/Pages/configurar.html">
                    <i class="bi bi-house-gear-fill"></i>
                    <span>Configurar</span>
                </a>
            </li>
            <li>
                <a href="/TelaInicial/Pages/perfil.html">
                    <i class="bi bi-person-circle"></i>
                    <span>Perfil</span>
                </a>
            </li>
        </ul>
    </nav>
    <div class="container">
        <header>
            <ul id="header-items">
                <li>
                    <i class="bi bi-briefcase-fill"></i>
                    <a href="#">Serviços</a>
                </li>
                <li>
                    <i class="bi bi-telephone"></i>
                    <a href="#">Contatos</a>
                </li>
                <li>
                    <i class="bi bi-info-circle"></i>
                    <a href="#">Sobre</a>
                </li>
            </ul>
        </header>

        <main>
            
        </main>

    </div>
</body>
<script>
    let links = document.querySelectorAll('a');
    for (let i = 0; i < links.length; i++) {
        links[i].addEventListener('click', function(event) {
            event.preventDefault();
            let url = this.getAttribute('href');
            fetch(url)
                .then(response => response.text())
                .then(data => {
                    document.querySelector('main').innerHTML = data;
                })
        
        });
    }
</script>
</html>
